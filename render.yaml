services:
  - type: web
    name: clima-gohilevel
    runtime: node
    plan: starter
    buildCommand: >-
      corepack enable pnpm &&
      pnpm install --config.minimumReleaseAge=0 &&
      pnpm exec prisma generate &&
      pnpm exec prisma migrate deploy &&
      pnpm exec prisma db seed &&
      pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AUTH_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: clima-db
          property: connectionString

databases:
  - name: clima-db
    databaseName: clima
    user: clima
    plan: free
